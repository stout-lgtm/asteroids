// ─── Main loop ────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  W = canvas.width; H = canvas.height;
  if (activeTheme.id === 'psychedelic') psychHue = (psychHue + 40 * dt) % 360;

  // ── Title ──
  if (state === 'title') {
    for (const a of asteroids) updateAsteroid(a, dt);
    for (const p of particles) updateParticle(p, dt);
    particles = particles.filter(p => p.life > 0);
    // Pulse the heart on the title screen
    titleHeartPhase += dt * 3.2;  // ~0.5Hz pulse
    drawTitle();
    return;
  }

  // ── Theme select ──
  if (state === 'themes') {
    drawThemeSelect();
    return;
  }

  // ── Story screen ──
  if (state === 'story') {
    drawStory();
    return;
  }

  // ── Non-gameplay screens ──
  if (state === 'enterName') {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    for (const p of particles) { updateParticle(p, dt); drawParticle(p); }
    particles = particles.filter(p => p.life > 0);
    drawEnterName();
    return;
  }
  if (state === 'leaderboard') {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    drawLeaderboard();
    return;
  }

  // ── Update (playing / dead / gameover) ──
  if (gameOverDelay > 0) gameOverDelay -= dt;
  if (extraLifeMsg  > 0) extraLifeMsg  -= dt;

  // Katana slash timer (raw dt)
  if (katanaSlash) {
    katanaSlash.life -= dt;
    if (katanaSlash.life <= 0) katanaSlash = null;
  }

  // Combo timer decay (raw dt)
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; comboMult = 1; }
  }

  // Time dilation (Psychedelic only, raw dt)
  if (state === 'playing' && activeTheme.modifiers.timeDilation) {
    dilationNext -= dt;
    if (dilationNext <= 0 && dilationPhase === 0) {
      dilationPhase = 1;
      dilationTimer = 2.5;
      dilationNext  = rand(35, 50);
      dilationFlash = 0.35;
    }
    if (dilationPhase > 0) {
      dilationTimer -= dt;
      if (dilationTimer <= 0) {
        if (dilationPhase === 1) {
          dilationPhase = 2;
          dilationTimer = 1.5;
          dilationFlash = 0.5;
          if (audioCtx) {
            const t2 = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(660, t2);
            osc.frequency.exponentialRampToValueAtTime(165, t2 + 0.3);
            const g2 = audioCtx.createGain();
            g2.gain.setValueAtTime(0.22, t2);
            g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.3);
            osc.connect(g2); g2.connect(audioCtx.destination);
            osc.start(t2); osc.stop(t2 + 0.32);
          }
        } else {
          dilationPhase = 0;
        }
      }
    }
  }

  const effectiveDt = getEffectiveDt(dt);
  for (const a of asteroids) updateAsteroid(a, effectiveDt);
  for (const b of bullets)   updateBullet(b, effectiveDt);
  for (const p of particles) updateParticle(p, effectiveDt);
  for (const s of shards)    updateShard(s, effectiveDt);
  for (const r of oceanRings) updateRing(r, dt);
  bullets    = bullets.filter(b => b.life > 0);
  particles  = particles.filter(p => p.life > 0);
  shards     = shards.filter(s => s.life > 0);
  oceanRings = oceanRings.filter(r => r.life > 0);

  if (state === 'playing') {
    updateShip(ship, effectiveDt);

    // Fire
    fireCooldown -= dt;
    const firing = isFiring() || mobileFire();
    if (firing && fireCooldown <= 0 && !ship.dead) {
      // Subtract π/2: visual nose = (cos(angle−π/2), sin(angle−π/2)) — see updateShip.
      // UFO passes a raw atan2 angle so fireBullet itself is left unchanged.
      fireBullet(ship, ship.angle - Math.PI / 2, false);
      sfx.shoot();
      fireCooldown = FIRE_COOLDOWN;
    }

    // Hyperspace
    if (isHyper()) doHyperspace();

    // UFO management — track alive/dead transitions for sound
    const ufoWasAlive = !!ufo;
    ufoTimer += dt;
    if (!ufo && ufoTimer >= ufoNextTime && score >= getLevelCfg().ufoSc) {
      ufo         = makeUFO();
      ufoNextTime = 20 + rand(0, 15);
      ufoTimer    = 0;
    }
    if (ufo) { updateUFO(ufo, dt); if (ufo.dead) { sfx.ufoStop(); ufo = null; } }
    if (!ufoWasAlive && ufo)  sfx.ufoStart(ufo.type);

    // Wave clear
    if (asteroids.length === 0 && !ufo) {
      if (waveDelay <= 0) waveDelay = 2.5;
      waveDelay -= dt;
      if (waveDelay <= 0) {
        wave++; spawnWave(); ufoTimer = 0; waveDelay = 0;
        // Theme-specific Steam achievements at wave 5
        if (wave === 5 && activeTheme.id !== 'base') {
          Steam.unlockAchievement('THEME_WAVE_5_' + activeTheme.id.toUpperCase());
        }
      }
    }

    // Ocean current system (Neon Ocean only)
    if (activeTheme.modifiers.oceanCurrent) {
      currentTimer -= dt;
      if (currentTimer <= 0) {
        currentAngle += rand(-Math.PI * 0.6, Math.PI * 0.6);
        currentSpeed  = rand(10, 28);
        currentTimer  = rand(12, 20);
      }
      const cx = Math.cos(currentAngle) * currentSpeed * dt;
      const cy = Math.sin(currentAngle) * currentSpeed * dt;
      for (const a of asteroids) {
        a.x = wrap(a.x + cx, canvas.width);
        a.y = wrap(a.y + cy, canvas.height);
      }
    }

    checkCollisions();

    // Heartbeat — tempo rises as fewer asteroids remain
    const numThings    = asteroids.length + (ufo ? 3 : 0);
    const beatInterval = Math.max(0.22, 1.0 - numThings * 0.055);
    beatTimer -= dt;
    if (beatTimer <= 0) {
      sfx.beat(beatPhase === 0 ? activeTheme.sfxBeatFreqA : activeTheme.sfxBeatFreqB);
      beatPhase = 1 - beatPhase;
      beatTimer = beatInterval;
    }
  }

  if (state === 'dead') {
    waveDelay -= dt;
    if (waveDelay <= 0) { ship = makeShip(); state = 'playing'; }
  }

  // ── Draw ──
  ctx.fillStyle = activeTheme.bgColor;
  ctx.fillRect(0, 0, W, H);
  // Neon Ocean: deep-sea vignette
  if (activeTheme.id === 'neonOcean') {
    const vg = ctx.createRadialGradient(
      W/2, H/2, Math.min(W,H) * 0.3,
      W/2, H/2, Math.min(W,H) * 0.85
    );
    vg.addColorStop(0, 'rgba(0,8,16,0)');
    vg.addColorStop(1, 'rgba(0,2,12,0.7)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }
  // Feudal Japan: warm amber candlelight vignette
  if (activeTheme.id === 'feudalJapan') {
    const vg = ctx.createRadialGradient(
      W/2, H/2, Math.min(W,H) * 0.25,
      W/2, H/2, Math.min(W,H) * 0.9
    );
    vg.addColorStop(0, 'rgba(10,7,5,0)');
    vg.addColorStop(1, 'rgba(20,8,0,0.75)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }
  drawStars();

  for (const a of asteroids) drawAsteroid(a);
  for (const b of bullets)   drawBullet(b);
  for (const p of particles) drawParticle(p);
  for (const s of shards)    drawShard(s);
  for (const r of oceanRings) drawRing(r);
  // Ghost trail (Psychedelic) — drawn before ship
  if (activeTheme.modifiers.ghostTrail && shipTrail.length > 0) {
    shipTrail.forEach((ghost, i) => {
      const ghostAlpha = 0.28 - i * 0.06;
      if (ghostAlpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = ghostAlpha;
      const ghostC = hslRotate(activeTheme.shipColor, psychHue + i * 30);
      setGlow(activeTheme.shipGlow * 0.5);
      ctx.shadowColor = ghostC;
      drawPoly(SHIP_SHAPE, ghost.x, ghost.y, ghost.angle, 1, ghostC);
      clearGlow();
      ctx.restore();
    });
  }
  if (ufo)  drawUFO(ufo);
  if (ship) drawShip(ship);
  // Dilation flash overlay
  if (dilationFlash > 0 && activeTheme.id === 'psychedelic') {
    dilationFlash -= dt;
    ctx.save();
    ctx.globalAlpha = Math.min(0.3, dilationFlash * 0.8);
    ctx.fillStyle = hslRotate('#ff88ff', psychHue);
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  if (state === 'playing' || state === 'dead') drawHUD();

  if (state === 'gameover') {
    drawHUD();
    drawGameOver();
  }

}

// ─── Boot ─────────────────────────────────────────────────────────────────────
initTitle();
requestAnimationFrame(loop);
</script>
</body>
</html>
