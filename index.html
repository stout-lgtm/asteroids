    r:    Math.random() < 0.7 ? 1 : 1.5,

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, TAU);

  ctx.globalAlpha = 1;
}

// ── 10 hand-tuned levels ─────────────────────────────────────────────────────
// ── Infinite difficulty curve ─────────────────────────────────────────────────
// No fixed level cap — wave number drives a smooth math formula forever.
// Early waves are forgiving; difficulty climbs steadily; caps prevent impossibility.
//
//  Wave  | Rocks | Speed | UFO threshold | UFO interval | UFO accuracy
//  ------+-------+-------+---------------+--------------+-------------
//    1   |   3L  |  1.00 |   never       |    2.2s      |   0%
//    5   |   5L  |  1.40 |   2100        |    1.9s      |  10%
//   10   |   8L  |  1.90 |   1200        |    1.5s      |  35%
//   20   |  12L  |  2.90 |     0         |    0.8s      |  82% (cap)
//   30+  |  12L  |  3.40 |     0         |    0.75s     |  82% (cap)

function getLevelCfg() {
  const w  = wave;
  const ew = w * 1.15;  // effective wave — difficulty ramps ~15% sooner
  return {
    L:      Math.min(3 + Math.floor(ew * 0.50), 12),
    M:      w <= 2 ? 0 : Math.min(Math.floor((ew - 2) * 0.35), 5),
    spd:    Math.min(1.0 + (ew - 1) * 0.10, 3.5),
    ufoSc:  w <= 2 ? Infinity : Math.max(0, 3000 - ew * 180),
    ufoInt: Math.max(0.75, 2.2 - ew * 0.07),
    ufoAcc: Math.min(0.82, Math.max(0, (ew - 3) * 0.05)),
  };
}

function setTheme(id) {

  if (!t) return;
  activeTheme = t;

}

function loadSavedTheme() {
  // Detect build environment

  if (window.__MOBILE_BUILD__) DLC.isMobileBuild = true;

  try {
    const saved = localStorage.getItem('1979_theme');
    if (saved && THEMES[saved] && DLC.isUnlocked(saved)) {
      activeTheme = THEMES[saved];
    }
  } catch (_) {}
}

    if (this._pendingCallback) this._pendingCallback();

    if (success) {

// ─── Audio Engine ────────────────────────────────────────────────────────────
// audioCtx is ALWAYS null at load — created lazily inside the first user gesture.
// This is the only approach that reliably unlocks audio on iOS Safari.
// Desktop browsers (Chrome/Firefox) impose no restriction on when it's created.
let audioCtx = null;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function resumeAudio() {
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') return audioCtx.resume();
  return Promise.resolve();
}

// ── Splash / audio-unlock screen (mobile only) ───────────────────────────────
const splash = document.getElementById('splash');

function unlockAudio() {
  const ac = ensureAudioCtx();
  // iOS requires audio to actually be scheduled inside the gesture.
  // Use the canonical empty-buffer unlock pattern (most compatible across iOS versions).
  try {
    const buf = ac.createBuffer(1, 1, ac.sampleRate);
    const src = ac.createBufferSource();
    src.buffer = buf;
    src.connect(ac.destination);
    src.start(0);
    if (ac.state === 'suspended') ac.resume();
  } catch (_) {}

  // Fade splash out
  splash.style.transition = 'opacity 0.4s';
  splash.style.opacity    = '0';
  setTimeout(() => { splash.style.display = 'none'; }, 420);
}

const isMobileDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isMobileDevice) {
  splash.style.display = 'flex';
  splash.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
  splash.addEventListener('click',      unlockAudio, { once: true });
}

// Build a buffer of white noise (reusable for explosions / thrust)
function makeNoiseBuf(seconds) {
  const ac  = ensureAudioCtx();
  const len = Math.ceil(ac.sampleRate * seconds);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

// Long loopable noise buffer — created lazily on first use so audioCtx exists
let _thrustBuf = null;
function getThrustBuf() {
  if (!_thrustBuf) _thrustBuf = makeNoiseBuf(3);

const sfx = {
  // ── one-shot sounds ──────────────────────────────────────────────────────

  shoot() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // 555 astable output — square wave not noise
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    // Capacitor C47/C48 discharge: frequency sweeps 1800Hz→200Hz
    // exponentially over ~38ms (RC time constant from schematic)
    osc.frequency.setValueAtTime(1800, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.038);
    // Volume tracks frequency — coupled decay via same RC circuit
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.45, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.038);
    // Lowpass to knock off square wave harshness at high freq
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(3000, t);
    lp.frequency.exponentialRampToValueAtTime(500, t + 0.038);
    osc.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.042);
    // Feudal Japan: bowstring twang overlay
    if (activeTheme.id === 'feudalJapan') {
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sawtooth';
      osc2.frequency.setValueAtTime(880, t);
      osc2.frequency.exponentialRampToValueAtTime(220, t + 0.045);
      const gj = audioCtx.createGain();
      gj.gain.setValueAtTime(0.12, t);
      gj.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
      osc2.connect(gj); gj.connect(audioCtx.destination);
      osc2.start(t); osc2.stop(t + 0.05);
    }
  },

  explode(size) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;

    // ── Configuration per asteroid size ────────────────────────────────────
    // Hardware coupling: filter cutoff AND gain follow the SAME exponential
    // decay via shared RC circuit. Both start at maximum instantly (no ramp).
    const cfg = {
      large: {
        fStart: 7200, fEnd: 38,  vol: 1.05, dur: 1.05,
        body:   { freq: 52, fEnd: 20, vol: 0.6, dur: 0.4 },
      },
      medium: {
        fStart: 4500, fEnd: 75,  vol: 0.78, dur: 0.52,
        body:   null,
      },
      small: {
        fStart: 3200, fEnd: 380, vol: 0.52, dur: 0.14,
        body:   null,
      },
    }[size] || { fStart: 4000, fEnd: 60, vol: 0.8, dur: 0.7, body: null };

    // ── Layer 1: Main noise burst through voltage-controlled lowpass ────────
    const src = audioCtx.createBufferSource();
    src.buffer = makeNoiseBuf(cfg.dur + 0.06);

    const filt = audioCtx.createBiquadFilter();
    filt.type     = 'lowpass';
    filt.Q.value  = 1.4;    // slight resonance at cutoff — analog character
    filt.frequency.setValueAtTime(cfg.fStart, t);
    filt.frequency.exponentialRampToValueAtTime(cfg.fEnd, t + cfg.dur);

    const g = audioCtx.createGain();
    // INSTANT full-volume attack — no ramp from 0
    g.gain.setValueAtTime(cfg.vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + cfg.dur);

    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t + cfg.dur + 0.06);

    // ── Layer 2: Sub-bass oscillator body (large only) ─────────────────────
    if (cfg.body) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(cfg.body.freq, t);
      osc.frequency.exponentialRampToValueAtTime(cfg.body.fEnd, t + cfg.body.dur);
      const gBody = audioCtx.createGain();
      gBody.gain.setValueAtTime(cfg.body.vol, t);
      gBody.gain.exponentialRampToValueAtTime(0.001, t + cfg.body.dur);
      osc.connect(gBody); gBody.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + cfg.body.dur + 0.02);
    }

    // ── Theme-specific additions ───────────────────────────────────────────
    if (activeTheme.id === 'neonOcean' && size === 'large') {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(48, t);
      osc.frequency.exponentialRampToValueAtTime(18, t + 0.4);
      const gw = audioCtx.createGain();
      gw.gain.setValueAtTime(0.35, t);
      gw.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gw); gw.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.42);
    }
    if (activeTheme.id === 'feudalJapan' && size === 'large') {
      const drumBuf = makeNoiseBuf(0.5);
      const drum = audioCtx.createBufferSource();
      drum.buffer = drumBuf;
      const drumLp = audioCtx.createBiquadFilter();
      drumLp.type = 'lowpass';
      drumLp.frequency.setValueAtTime(180, t);
      drumLp.frequency.exponentialRampToValueAtTime(40, t + 0.5);
      const drumG = audioCtx.createGain();
      drumG.gain.setValueAtTime(0.55, t);
      drumG.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      const body2 = audioCtx.createOscillator();
      body2.type = 'sine';
      body2.frequency.setValueAtTime(65, t);
      body2.frequency.exponentialRampToValueAtTime(30, t + 0.3);
      const bodyG2 = audioCtx.createGain();
      bodyG2.gain.setValueAtTime(0.35, t);
      bodyG2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      drum.connect(drumLp); drumLp.connect(drumG); drumG.connect(audioCtx.destination);
      body2.connect(bodyG2); bodyG2.connect(audioCtx.destination);
      drum.start(t); drum.stop(t + 0.55);
      body2.start(t); body2.stop(t + 0.35);
    }
    if (activeTheme.id === 'psychedelic' && size === 'medium') {
      const osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(320, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.3);
      const gp = audioCtx.createGain();
      gp.gain.setValueAtTime(0.18, t);
      gp.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(gp); gp.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.32);
    }
  },

  beat(freq) {
    if (!audioCtx) return;
    const t   = audioCtx.currentTime;
    // 555 timer = square wave output
    const osc = audioCtx.createOscillator();
    osc.type            = 'square';
    osc.frequency.value = freq;
    // Short lowpass to shape the square without killing the punch
    const lp = audioCtx.createBiquadFilter();
    lp.type             = 'lowpass';
    lp.frequency.value  = 520;
    lp.Q.value          = 1.8;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.55, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.13);
    // Psychedelic overtone
    if (activeTheme.id === 'psychedelic') {
      const osc2 = audioCtx.createOscillator();
      osc2.type           = 'sine';
      osc2.frequency.value = freq * 1.5;
      const g2 = audioCtx.createGain();
      g2.gain.setValueAtTime(0.12, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc2.connect(g2); g2.connect(audioCtx.destination);
      osc2.start(t); osc2.stop(t + 0.15);
    }
    // Feudal Japan: taiko strike overlay
    if (activeTheme.id === 'feudalJapan') {
      const taikoBuf = makeNoiseBuf(0.12);
      const src = audioCtx.createBufferSource();
      src.buffer = taikoBuf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = freq * 1.8;
      bp.Q.value = 2.5;
      const tg = audioCtx.createGain();
      tg.gain.setValueAtTime(0.28, t);
      tg.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      src.connect(bp); bp.connect(tg); tg.connect(audioCtx.destination);
      src.start(t); src.stop(t + 0.14);
    }
  },

  // ── continuous sounds (start / stop) ─────────────────────────────────────

  _thrustSrc:  null,
  _thrustGain: null,

  thrustOn() {
    if (this._thrustGain) return;
    const ac = ensureAudioCtx();
    if (ac.state === 'suspended') ac.resume();
    const t   = ac.currentTime;
    const src = ac.createBufferSource();
    src.buffer = getThrustBuf();
    src.loop   = true;

    const lpf = ac.createBiquadFilter();
    lpf.type = 'lowpass';
    const cutoff = activeTheme.id === 'neonOcean'   ? 320
                 : activeTheme.id === 'psychedelic'  ? 480
                 : activeTheme.id === 'feudalJapan'  ? 360
                 : 400;
    lpf.frequency.value = cutoff;
    if (activeTheme.id === 'neonOcean')    lpf.Q.value = 4.0;
    else if (activeTheme.id === 'feudalJapan') lpf.Q.value = 2.5;

    const g = ac.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.28, t + 0.06);

    src.connect(lpf); lpf.connect(g); g.connect(ac.destination);
    src.start(t);
    this._thrustSrc  = src;
    this._thrustGain = g;
  },

  thrustOff() {
    if (!this._thrustGain || !audioCtx) return;
    const t = audioCtx.currentTime;
    this._thrustGain.gain.linearRampToValueAtTime(0, t + 0.08);
    const src = this._thrustSrc;
    setTimeout(() => { try { src.stop(); } catch (_) {} }, 120);
    this._thrustSrc  = null;
    this._thrustGain = null;
  },

  _ufoOsc:  null,
  _ufoLfo:  null,
  _ufoGain: null,

  ufoStart(type) {
    if (!audioCtx || this._ufoOsc) return;
    const t     = audioCtx.currentTime;
    const isBig = type !== 'small';
    const osc   = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = isBig ? activeTheme.sfxUfoBigFreq : activeTheme.sfxUfoSmallFreq;
    const lfo     = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value  = isBig ? 2.5 : 9;
    lfoGain.gain.value   = isBig ? 55 : 85;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    const g = audioCtx.createGain();
    g.gain.value = isBig ? 0.12 : 0.09;
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); lfo.start(t);
    this._ufoOsc  = osc;
    this._ufoLfo  = lfo;
    this._ufoGain = g;
  },

  extraLife() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Same 3KHz square wave as thrust — different gate switch ($3C05)
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 3000;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 800;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.09);
  },

  ufoStop() {
    if (!this._ufoOsc) return;
    try { this._ufoOsc.stop(); } catch (_) {}
    try { this._ufoLfo.stop(); } catch (_) {}
    this._ufoOsc = null; this._ufoLfo = null; this._ufoGain = null;
  },

  stopAll() {
    this.thrustOff();
    this.ufoStop();
  },
};

// ─── Background Music Engine ─────────────────────────────────────────────────
// Generative synth music loops — one per vibe pack, silent for base theme.
const music = {
  _nodes: [],      // all scheduled oscillators/sources to stop
  _gains: [],      // gain nodes for fade-out
  _interval: null, // scheduling loop
  _playing: false,

  start() {
    if (!audioCtx || this._playing) return;
    if (activeTheme.id === 'base') return;  // base has no music
    this._playing = true;
    if (activeTheme.id === 'neonOcean') this._startNeonOcean();
    else if (activeTheme.id === 'psychedelic') this._startPsychedelic();
    else if (activeTheme.id === 'feudalJapan') this._startFeudalJapan();
  },

  stop() {
    if (!this._playing) return;
    this._playing = false;
    if (this._interval) { clearInterval(this._interval); this._interval = null; }
    // Fade out all gain nodes then disconnect
    const t = audioCtx ? audioCtx.currentTime : 0;
    for (const g of this._gains) {
      try {
        g.gain.cancelScheduledValues(t);
        g.gain.setValueAtTime(g.gain.value, t);
        g.gain.linearRampToValueAtTime(0, t + 0.3);
      } catch (_) {}
    }
    // Stop all nodes after fade
    setTimeout(() => {
      for (const n of this._nodes) { try { n.stop(); } catch (_) {} }
      this._nodes = [];
      this._gains = [];
    }, 400);
  },

  // ── Neon Ocean: ambient underwater synths ─────────────────────────────────
  _startNeonOcean() {
    const ac = audioCtx;
    const t = ac.currentTime;
    const master = ac.createGain();
    master.gain.value = 0.18;
    master.connect(ac.destination);
    this._gains.push(master);

    // Deep drone pad — two detuned oscillators
    const drone1 = ac.createOscillator();
    drone1.type = 'sine';
    drone1.frequency.value = 55; // A1
    const drone2 = ac.createOscillator();
    drone2.type = 'sine';
    drone2.frequency.value = 55.4; // slightly detuned for slow beating

    const droneG = ac.createGain();
    droneG.gain.value = 0.35;
    const droneLp = ac.createBiquadFilter();
    droneLp.type = 'lowpass';
    droneLp.frequency.value = 200;

    drone1.connect(droneG); drone2.connect(droneG);
    droneG.connect(droneLp); droneLp.connect(master);
    drone1.start(t); drone2.start(t);
    this._nodes.push(drone1, drone2);

    // Slow evolving pad — triangle wave with LFO on filter
    const pad = ac.createOscillator();
    pad.type = 'triangle';
    pad.frequency.value = 110; // A2
    const pad2 = ac.createOscillator();
    pad2.type = 'triangle';
    pad2.frequency.value = 165; // E3 — fifth above

    const padG = ac.createGain();
    padG.gain.value = 0.2;
    const padLp = ac.createBiquadFilter();
    padLp.type = 'lowpass';
    padLp.frequency.value = 400;
    padLp.Q.value = 2;

    // LFO sweeps the pad filter slowly
    const padLfo = ac.createOscillator();
    padLfo.type = 'sine';
    padLfo.frequency.value = 0.08; // very slow — 12.5s cycle
    const padLfoG = ac.createGain();
    padLfoG.gain.value = 300;
    padLfo.connect(padLfoG);
    padLfoG.connect(padLp.frequency);

    pad.connect(padG); pad2.connect(padG);
    padG.connect(padLp); padLp.connect(master);
    pad.start(t); pad2.start(t); padLfo.start(t);
    this._nodes.push(pad, pad2, padLfo);

    // Filtered noise — underwater bubbles / current
    const noiseBuf = makeNoiseBuf(4);
    const noise = ac.createBufferSource();
    noise.buffer = noiseBuf;
    noise.loop = true;
    const noiseLp = ac.createBiquadFilter();
    noiseLp.type = 'bandpass';
    noiseLp.frequency.value = 300;
    noiseLp.Q.value = 1.5;
    const noiseG = ac.createGain();
    noiseG.gain.value = 0.08;

    // LFO on noise filter — simulates water current
    const noiseLfo = ac.createOscillator();
    noiseLfo.type = 'sine';
    noiseLfo.frequency.value = 0.15;
    const noiseLfoG = ac.createGain();
    noiseLfoG.gain.value = 200;
    noiseLfo.connect(noiseLfoG);
    noiseLfoG.connect(noiseLp.frequency);

    noise.connect(noiseLp); noiseLp.connect(noiseG); noiseG.connect(master);
    noise.start(t); noiseLfo.start(t);
    this._nodes.push(noise, noiseLfo);

    // Sonar pings — scheduled periodically
    let pingTime = t + 2;
    const sonarNotes = [330, 440, 392, 523, 349, 294]; // E4, A4, G4, C5, F4, D4
    let noteIdx = 0;
    this._interval = setInterval(() => {
      if (!this._playing || !audioCtx) return;
      const now = ac.currentTime;
      const freq = sonarNotes[noteIdx % sonarNotes.length];
      noteIdx++;

      const ping = ac.createOscillator();
      ping.type = 'sine';
      ping.frequency.value = freq;
      const pingG = ac.createGain();
      pingG.gain.setValueAtTime(0.12, now);
      pingG.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      const pingReverb = ac.createBiquadFilter();
      pingReverb.type = 'lowpass';
      pingReverb.frequency.value = 1200;
      ping.connect(pingReverb); pingReverb.connect(pingG); pingG.connect(master);
      ping.start(now);
      ping.stop(now + 2.0);
    }, 3200);
  },

  // ── Psychedelic: 70s prog rock synths ─────────────────────────────────────
  _startPsychedelic() {
    const ac = audioCtx;
    const t = ac.currentTime;
    const master = ac.createGain();
    master.gain.value = 0.16;
    master.connect(ac.destination);
    this._gains.push(master);

    // Phased bass line — sawtooth with slow filter sweep
    const bass = ac.createOscillator();
    bass.type = 'sawtooth';
    bass.frequency.value = 73.4; // D2
    const bassG = ac.createGain();
    bassG.gain.value = 0.3;
    const bassLp = ac.createBiquadFilter();
    bassLp.type = 'lowpass';
    bassLp.frequency.value = 300;
    bassLp.Q.value = 4;

    // Slow filter sweep on bass — "wah" feel
    const bassLfo = ac.createOscillator();
    bassLfo.type = 'sine';
    bassLfo.frequency.value = 0.12;
    const bassLfoG = ac.createGain();
    bassLfoG.gain.value = 250;
    bassLfo.connect(bassLfoG);
    bassLfoG.connect(bassLp.frequency);

    bass.connect(bassLp); bassLp.connect(bassG); bassG.connect(master);
    bass.start(t); bassLfo.start(t);
    this._nodes.push(bass, bassLfo);

    // Organ pad — stacked square waves (fundamental + 3rd + 5th)
    const organFreqs = [146.8, 185, 220]; // D3, ~F#3, A3
    for (const freq of organFreqs) {
      const osc = ac.createOscillator();
      osc.type = 'square';
      osc.frequency.value = freq;
      const g = ac.createGain();
      g.gain.value = 0.06;
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 800;
      osc.connect(lp); lp.connect(g); g.connect(master);
      osc.start(t);
      this._nodes.push(osc);
    }

    // Phase shifter effect on organ — two notch filters with LFO
    // (simulated by modulating a bandpass on the master)
    const phaseLfo = ac.createOscillator();
    phaseLfo.type = 'triangle';
    phaseLfo.frequency.value = 0.25; // slow phase sweep
    const phaseLfoG = ac.createGain();
    phaseLfoG.gain.value = 600;
    const phaseNotch = ac.createBiquadFilter();
    phaseNotch.type = 'notch';
    phaseNotch.frequency.value = 1000;
    phaseNotch.Q.value = 1;
    phaseLfo.connect(phaseLfoG);
    phaseLfoG.connect(phaseNotch.frequency);
    phaseLfo.start(t);
    this._nodes.push(phaseLfo);

    // Arpeggiator — classic prog rock ascending sequences
    const arpNotes = [
      293.7, 349.2, 440, 523.3,   // D4, F4, A4, C5
      587.3, 523.3, 440, 349.2,   // D5, C5, A4, F4  (descending)
      392, 440, 523.3, 659.3,     // G4, A4, C5, E5
      587.3, 523.3, 440, 392,     // D5, C5, A4, G4
    ];
    let arpIdx = 0;
    const arpSpeed = 180; // ms per note

    this._interval = setInterval(() => {
      if (!this._playing || !audioCtx) return;
      const now = ac.currentTime;
      const freq = arpNotes[arpIdx % arpNotes.length];
      arpIdx++;

      const osc = ac.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const g = ac.createGain();
      const noteDur = arpSpeed / 1000 * 0.8;
      g.gain.setValueAtTime(0.14, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + noteDur);
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(2000, now);
      lp.frequency.exponentialRampToValueAtTime(400, now + noteDur);
      lp.Q.value = 3;
      osc.connect(lp); lp.connect(g); g.connect(master);
      osc.start(now);
      osc.stop(now + noteDur + 0.05);
    }, arpSpeed);

    // High lead melody — slow singing line over the arps
    const melodyNotes = [
      { f: 587.3, d: 0.6 },  // D5
      { f: 659.3, d: 0.4 },  // E5
      { f: 698.5, d: 0.8 },  // F5
      { f: 659.3, d: 0.3 },  // E5
      { f: 587.3, d: 0.5 },  // D5
      { f: 523.3, d: 0.7 },  // C5
      { f: 440,   d: 0.9 },  // A4
      { f: 0, d: 0.5 },      // rest
    ];
    let melIdx = 0;
    const melTimer = setInterval(() => {
      if (!this._playing || !audioCtx) return;
      const now = ac.currentTime;
      const note = melodyNotes[melIdx % melodyNotes.length];
      melIdx++;
      if (note.f === 0) return; // rest

      const osc = ac.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = note.f;
      // Vibrato
      const vib = ac.createOscillator();
      vib.type = 'sine';
      vib.frequency.value = 5.5;
      const vibG = ac.createGain();
      vibG.gain.value = 4;
      vib.connect(vibG); vibG.connect(osc.frequency);

      const g = ac.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.1, now + 0.05);
      g.gain.setValueAtTime(0.1, now + note.d * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, now + note.d);
      osc.connect(g); g.connect(master);
      osc.start(now); vib.start(now);
      osc.stop(now + note.d + 0.05);
      vib.stop(now + note.d + 0.05);
    }, 600);
    // Store secondary interval so we can clear it
    const origInterval = this._interval;
    this._interval = {
      _ids: [origInterval, melTimer],
    };
    // Override clearInterval logic
    const origStop = this.stop.bind(this);
    // Patch: store both intervals for cleanup
    this._extraIntervals = [melTimer];
  },

  _startFeudalJapan() {
    const ac = audioCtx;
    const t  = ac.currentTime;
    const master = ac.createGain();
    master.gain.value = 0.15;
    master.connect(ac.destination);
    this._gains.push(master);

    // ── Deep taiko drone ─────────────────────────────────────────
    const taiko1 = ac.createOscillator();
    taiko1.type = 'sine';
    taiko1.frequency.value = 55;
    const taiko2 = ac.createOscillator();
    taiko2.type = 'sine';
    taiko2.frequency.value = 56.2;
    const taikoG = ac.createGain();
    taikoG.gain.value = 0.22;
    const taikoLp = ac.createBiquadFilter();
    taikoLp.type = 'lowpass';
    taikoLp.frequency.value = 180;
    taiko1.connect(taikoG); taiko2.connect(taikoG);
    taikoG.connect(taikoLp); taikoLp.connect(master);
    taiko1.start(t); taiko2.start(t);
    this._nodes.push(taiko1, taiko2);

    // ── Mountain wind through bamboo ──────────────────────────────
    const windBuf = makeNoiseBuf(4);
    const wind = ac.createBufferSource();
    wind.buffer = windBuf;
    wind.loop = true;
    const windBp = ac.createBiquadFilter();
    windBp.type = 'bandpass';
    windBp.frequency.value = 600;
    windBp.Q.value = 0.8;
    const windG = ac.createGain();
    windG.gain.value = 0.04;
    const windLfo = ac.createOscillator();
    windLfo.type = 'sine';
    windLfo.frequency.value = 0.06;
    const windLfoG = ac.createGain();
    windLfoG.gain.value = 300;
    windLfo.connect(windLfoG);
    windLfoG.connect(windBp.frequency);
    wind.connect(windBp); windBp.connect(windG); windG.connect(master);
    wind.start(t); windLfo.start(t);
    this._nodes.push(wind, windLfo);

    // ── Koto-like plucked string ──────────────────────────────────
    const kotoNotes = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 392.0, 329.6];
    let kotoIdx = 0;
    this._extraIntervals = this._extraIntervals || [];
    const kotoInterval = setInterval(() => {
      if (!this._playing || !audioCtx) return;
      const now = ac.currentTime;
      const freq = kotoNotes[kotoIdx % kotoNotes.length];
      kotoIdx++;
      const osc = ac.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const env = ac.createGain();
      env.gain.setValueAtTime(0.18, now);
      env.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
      const kotoLp = ac.createBiquadFilter();
      kotoLp.type = 'lowpass';
      kotoLp.frequency.setValueAtTime(1800, now);
      kotoLp.frequency.exponentialRampToValueAtTime(400, now + 0.4);
      kotoLp.Q.value = 1.5;
      osc.connect(kotoLp); kotoLp.connect(env); env.connect(master);
      osc.start(now); osc.stop(now + 0.6);
    }, 1100);
    this._extraIntervals.push(kotoInterval);

    // ── Shakuhachi lead melody ────────────────────────────────────
    const shaku = [
      { f: 293.7, d: 0.9 }, { f: 329.6, d: 0.5 }, { f: 392.0, d: 1.1 },
      { f: 440.0, d: 0.4 }, { f: 392.0, d: 0.7 }, { f: 329.6, d: 1.3 },
      { f: 0,     d: 0.8 }, { f: 261.6, d: 0.6 }, { f: 293.7, d: 0.8 },
      { f: 440.0, d: 1.4 }, { f: 392.0, d: 0.5 }, { f: 0,     d: 1.2 },
    ];
    let shakuIdx = 0;
    const scheduleShaku = () => {
      if (!this._playing || !audioCtx) return;
      const note = shaku[shakuIdx % shaku.length];
      shakuIdx++;
      const dur = note.d * 1000;
      if (note.f > 0) {
        const now = ac.currentTime;
        const osc = ac.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = note.f;
        const vib = ac.createOscillator();
        vib.type = 'sine';
        vib.frequency.value = 5.2;
        const vibG = ac.createGain();
        vibG.gain.value = 5.5;
        vib.connect(vibG); vibG.connect(osc.frequency);
        const env = ac.createGain();
        const attackT  = 0.08;
        const releaseT = note.d * 0.25;
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(0.13, now + attackT);
        env.gain.setValueAtTime(0.13, now + note.d - releaseT);
        env.gain.exponentialRampToValueAtTime(0.001, now + note.d);
        const hp = ac.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 200;
        osc.connect(hp); hp.connect(env); env.connect(master);
        osc.start(now); vib.start(now);
        osc.stop(now + note.d + 0.05);
        vib.stop(now + note.d + 0.05);
      }
      const shakuTimer = setTimeout(scheduleShaku, dur);
      this._extraIntervals.push(shakuTimer);
    };
    scheduleShaku();
  },
};

// Patch music.stop to also clear extra intervals
const _origMusicStop = music.stop.bind(music);
music.stop = function() {
  if (music._extraIntervals) {
    for (const id of music._extraIntervals) clearInterval(id);
    music._extraIntervals = [];
  }
  // Handle compound interval object from psychedelic
  if (music._interval && music._interval._ids) {
    for (const id of music._interval._ids) clearInterval(id);
    music._interval = null;
  }
  _origMusicStop();
};

// ─── Leaderboard (localStorage) ──────────────────────────────────────────────
function lbLoad() {
  try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); }
  catch (_) { return []; }
}

function lbSave(arr) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(arr)); } catch (_) {}
}

function lbQualifies(s) {
  if (s <= 0) return false;
  const lb = lbLoad();
  return lb.length < MAX_LB_ENTRIES || s > lb[lb.length - 1].score;
}

// Returns the full sorted board after insertion
function lbAdd(name, s, w) {
  const lb = lbLoad();
  lb.push({ name: name.trim().toUpperCase().slice(0, 12) || 'AAA', score: s, wave: w });
  lb.sort((a, b) => b.score - a.score);
  if (lb.length > MAX_LB_ENTRIES) lb.length = MAX_LB_ENTRIES;
  lbSave(lb);
  return lb;
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};

window.addEventListener('keydown', e => {
  resumeAudio();
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();

  if (state === 'themes') {
    if (e.code === 'Escape') goToTitle();
    if (e.code === 'ArrowUp')   themeSelectIndex = Math.max(0, themeSelectIndex - 1);
    if (e.code === 'ArrowDown') themeSelectIndex = Math.min(THEME_LIST.length - 1, themeSelectIndex + 1);
    if (e.code === 'Enter' || e.code === 'Space') activateOrPurchasePack(themeSelectIndex);
    return;
  }

  if (state === 'enterName') {
    if (e.code === 'Enter') submitName();
    return;  // block all game keys during name entry
  }

  if (state === 'leaderboard') {
    if (e.code === 'Space' || e.code === 'Enter' || e.code === 'Escape') goToTitle();
    return;
  }

  if (state === 'gameover') {
    if (e.code === 'Escape') { goToTitle(); return; }
    if (gameOverDelay <= 0 && (e.code === 'Space' || e.code === 'Enter')) handleGameOverContinue();
    return;
  }

  if (state === 'playing') {
    if (e.code === 'Escape') { goToTitle(); return; }
  }

  if (state === 'title') {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
    if (e.code === 'KeyT') { state = 'themes'; themeSelectIndex = 0; }
    if (e.code === 'KeyS') { state = 'story'; }
  }

  if (state === 'story') {
    if (e.code === 'Escape' || e.code === 'Space' || e.code === 'Enter') goToTitle();
  }
});

window.addEventListener('keyup', e => { keys[e.code] = false; });

function isLeft()   { return keys['ArrowLeft']  || keys['KeyA']; }
function isRight()  { return keys['ArrowRight'] || keys['KeyD']; }
function isThrust() { return keys['ArrowUp']    || keys['KeyW']; }
function isFiring() { return keys['Space']; }
function isHyper()  { return keys['KeyH']; }

// ─── Mobile touch ─────────────────────────────────────────────────────────────
const isMobile  = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
let joyTouch    = null;
let fireTouch   = null;
let hyperTouch  = null;

let joyRegion   = { x: 0, y: 0, r: 60 };
let fireRegion  = { x: 0, y: 0, r: 50 };
let hyperRegion = { x: 0, y: 0, r: 36 };

function touchInCircle(tx, ty, region) {
  const dx = tx - region.x, dy = ty - region.y;
  return dx*dx + dy*dy <= region.r * region.r * 2.5;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  resumeAudio();

  if (state === 'themes') { handleThemesTouch(e); return; }

  if (state === 'leaderboard') { goToTitle(); return; }

  if (state === 'gameover' && gameOverDelay <= 0) { handleGameOverContinue(); return; }

  if (state === 'story') { goToTitle(); return; }

  if (state === 'title') {
    for (const t of e.changedTouches) {
      const ty = t.clientY / canvas.height;
      // "CHANGE THE VIBE" zone (~menuY0 + menuGap area)
      if (ty > 0.48 && ty < 0.58) {
        state = 'themes'; themeSelectIndex = 0; return;
      }
      // "THE STORY" zone (~menuY0 + menuGap*2 area)
      if (ty > 0.58 && ty < 0.68) {
        state = 'story'; return;
      }
    }
    startGame(); return;
  }

  if (state === 'enterName') {
    nameInput.focus();  // re-open keyboard if dismissed
    return;
  }

  for (const t of e.changedTouches) {
    const tx = t.clientX, ty = t.clientY;
    if (!joyTouch && touchInCircle(tx, ty, joyRegion)) {
      joyTouch = { id: t.identifier, startX: tx, startY: ty, curX: tx, curY: ty };
    } else if (!fireTouch && touchInCircle(tx, ty, fireRegion)) {
      fireTouch = { id: t.identifier };
    } else if (!hyperTouch && touchInCircle(tx, ty, hyperRegion)) {
      hyperTouch = { id: t.identifier };
      doHyperspace();
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (joyTouch && t.identifier === joyTouch.id) {
      joyTouch.curX = t.clientX;
      joyTouch.curY = t.clientY;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (joyTouch   && t.identifier === joyTouch.id)   joyTouch   = null;
    if (fireTouch  && t.identifier === fireTouch.id)  fireTouch  = null;
    if (hyperTouch && t.identifier === hyperTouch.id) hyperTouch = null;
  }
}, { passive: false });

canvas.addEventListener('contextmenu', e => e.preventDefault());

function mobileLeft()   { return !!joyTouch && (joyTouch.curX - joyTouch.startX) < -10; }
function mobileRight()  { return !!joyTouch && (joyTouch.curX - joyTouch.startX) >  10; }
function mobileThrust() { return !!joyTouch && (joyTouch.startY - joyTouch.curY) >  10; }
function mobileFire()   { return !!fireTouch; }

// ─── Helpers ──────────────────────────────────────────────────────────────────
function rand(a, b)   { return a + Math.random() * (b - a); }
function randInt(a,b) { return Math.floor(rand(a, b + 1)); }
function wrap(v, max) { return ((v % max) + max) % max; }
function dist(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx*dx + dy*dy);
}

function getEffectiveDt(rawDt) {
  if (!activeTheme.modifiers.timeDilation) return rawDt;
  if (dilationPhase === 1) return rawDt * 0.45;   // slow-mo
  if (dilationPhase === 2) return rawDt * 1.60;   // fast-mo
  return rawDt;
}

function hslRotate(baseHex, hueShift) {
  const r = parseInt(baseHex.slice(1,3),16)/255;
  const g = parseInt(baseHex.slice(3,5),16)/255;
  const b = parseInt(baseHex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  let h = 0, s = 0;
  const l = (max+min)/2;
  if (d > 0) {
    s = d / (1 - Math.abs(2*l - 1));
    if (max===r) h = ((g-b)/d + (g<b?6:0)) * 60;
    else if (max===g) h = ((b-r)/d + 2) * 60;
    else h = ((r-g)/d + 4) * 60;
  }
  h = (h + hueShift) % 360;
  return `hsl(${Math.round(h)},${Math.round(s*100)}%,${Math.round(l*100)}%)`;
}

// ─── CRT phosphor glow helpers ───────────────────────────────────────────────
function setGlow(intensity) {
  ctx.shadowBlur  = intensity;
  ctx.shadowColor = '#ffffff';
}
function clearGlow() {
  ctx.shadowBlur = 0;
}

function drawPoly(pts, x, y, angle, scale, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.strokeStyle = color ?? '#fff';
  ctx.lineWidth   = 1.5;
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.scale(scale, scale);
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

// ─── Ship ─────────────────────────────────────────────────────────────────────
function makeShip() {
  return {
    x: canvas.width  / 2,
    y: canvas.height / 2,
    vx: 0, vy: 0,
    angle:      -Math.PI / 2,
    invincible: INVINCIBLE_TIME,
    flashTimer: 0,
    thrustOn:   false,
    dead:       false,
  };
}

const SHIP_SHAPE = [
  [0, -SHIP_SIZE],
  [-SHIP_SIZE * 0.6,  SHIP_SIZE * 0.75],
  [0,  SHIP_SIZE * 0.35],
  [ SHIP_SIZE * 0.6,  SHIP_SIZE * 0.75],
];

function drawShip(s) {
  if (s.dead) return;
  if (s.invincible > 0) {
    s.flashTimer -= 1 / 60;
    if (s.flashTimer > 0) return;
    s.flashTimer = FLASH_INTERVAL;
  }
  ctx.save();
  const shipC = activeTheme.id === 'psychedelic'
    ? hslRotate(activeTheme.shipColor, psychHue)
    : activeTheme.shipColor;
  setGlow(activeTheme.shipGlow);
  ctx.shadowColor = shipC;
  drawPoly(SHIP_SHAPE, s.x, s.y, s.angle, 1, shipC);

  if (s.thrustOn) {
    const flicker = rand(0.5, 1.0);
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.strokeStyle = activeTheme.thrustColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-SHIP_SIZE * 0.35, SHIP_SIZE * 0.4);
    ctx.lineTo(0, SHIP_SIZE * (0.8 + flicker * 0.7));
    ctx.lineTo( SHIP_SIZE * 0.35, SHIP_SIZE * 0.4);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function updateShip(s, dt) {
  if (s.dead) return;

  const left   = isLeft()   || mobileLeft();
  const right  = isRight()  || mobileRight();
  const thrust = isThrust() || mobileThrust();

  const rotSpd = ROTATION_SPD * activeTheme.modifiers.rotationMult;
  if (left)  s.angle -= rotSpd * dt;
  if (right) s.angle += rotSpd * dt;

  // Katana slash VFX (Feudal Japan)
  if (activeTheme.id === 'feudalJapan' && !s.dead) {
    const rotDelta = (left ? -1 : right ? 1 : 0) * rotSpd * dt;
    if (Math.abs(rotDelta) > 0.01) {
      katanaSlash = { x: s.x, y: s.y, angle: s.angle, life: 0.18, maxLife: 0.18 };
    }
  }

  const wasThrustOn = s.thrustOn;
  s.thrustOn = thrust;

  if (thrust) {
    // SHIP_SHAPE nose is at (0,−SHIP_SIZE) in local space.  ctx.rotate(angle)
    // makes the visual nose point in direction (cos(a−π/2), sin(a−π/2)).
    s.vx += Math.cos(s.angle - Math.PI / 2) * THRUST_POWER * dt;
    s.vy += Math.sin(s.angle - Math.PI / 2) * THRUST_POWER * dt;
  }

  // Thrust sound transitions
  if (!wasThrustOn && s.thrustOn)  sfx.thrustOn();
  if ( wasThrustOn && !s.thrustOn) sfx.thrustOff();

  const fric = activeTheme.modifiers.frictionVal;
  s.vx *= Math.pow(fric, dt * 60);
  s.vy *= Math.pow(fric, dt * 60);
  s.x   = wrap(s.x + s.vx * dt, canvas.width);
  s.y   = wrap(s.y + s.vy * dt, canvas.height);

  if (s.invincible > 0) s.invincible -= dt;

  if (activeTheme.modifiers.ghostTrail && !s.dead) {
    trailTimer -= dt;
    if (trailTimer <= 0) {
      trailTimer = 0.05;
      shipTrail.unshift({ x: s.x, y: s.y, angle: s.angle });
      if (shipTrail.length > 4) shipTrail.length = 4;
    }
  }

  if (activeTheme.modifiers.wakeTrail && s.thrustOn) {
    trailTimer -= dt;
    if (trailTimer <= 0) {
      trailTimer = 0.04;
      const behind = ship.angle + Math.PI / 2;
      const ex = s.x + Math.cos(behind) * SHIP_SIZE * 0.8;
      const ey = s.y + Math.sin(behind) * SHIP_SIZE * 0.8;
      particles.push({
        x: ex, y: ey,
        vx: rand(-12, 12),
        vy: rand(-12, 12),
        life: 0.55, maxLife: 0.55,
        color: '#00ffcc',
      });
    }
  }
}

function doHyperspace() {
  if (!ship || ship.dead) return;
  ship.x  = rand(50, canvas.width  - 50);
  ship.y  = rand(50, canvas.height - 50);
  ship.vx = 0; ship.vy = 0;
  spawnParticles(ship.x, ship.y, '#fff', 8);
}

// ─── Asteroids ────────────────────────────────────────────────────────────────
function makeAsteroid(x, y, size) {
  const r       = ASTEROID_SIZES[size] * activeTheme.modifiers.asteroidSizeMult;
  const numVerts = randInt(7, 12);
  const verts    = [];
  for (let i = 0; i < numVerts; i++) {
    const a = (i / numVerts) * TAU;
    const d = r * rand(0.75, 1.25);
    verts.push([Math.cos(a) * d, Math.sin(a) * d]);
  }
  const spd = ASTEROID_SPEED_BASE * getLevelCfg().spd
              * activeTheme.modifiers.asteroidSpeedMult * rand(0.7, 1.3);
  const dir = rand(0, TAU);
  return {
    x, y,
    vx: Math.cos(dir) * spd,
    vy: Math.sin(dir) * spd,
    rot: rand(-1.5, 1.5),
    angle: 0,
    size, r, verts,
    flashTimer: 0, isOni: false,
  };
}

function spawnWave() {
  const cfg = getLevelCfg();
  asteroids = [];

  // Spawn the mix of large + pre-split medium asteroids for this level
  const sizes = [
    ...Array(cfg.L).fill('large'),
    ...Array(cfg.M).fill('medium'),
  ];
  for (const size of sizes) {
    let x, y;
    do {
      x = rand(0, canvas.width);
      y = rand(0, canvas.height);
    } while (dist(x, y, ship.x, ship.y) < 160);
    asteroids.push(makeAsteroid(x, y, size));
  }

  // Oni Rock: inject boss rock on every 5th wave (Feudal Japan only)
  if (activeTheme.modifiers.oniRock && wave % 5 === 0 && wave > 0) {
    let ox, oy;
    do {
      ox = rand(0, canvas.width);
      oy = rand(0, canvas.height);
    } while (dist(ox, oy, ship.x, ship.y) < 220);
    const oni = makeAsteroid(ox, oy, 'large');
    oni.isOni = true;
    oni.hp    = 3;
    oni.maxHp = 3;
    const toPlayer = Math.atan2(ship.y - oy, ship.x - ox);
    const oniSpd   = ASTEROID_SPEED_BASE * getLevelCfg().spd * 0.65;
    oni.vx = Math.cos(toPlayer) * oniSpd;
    oni.vy = Math.sin(toPlayer) * oniSpd;
    asteroids.push(oni);
  }
}

function updateAsteroid(a, dt) {
  a.x = wrap(a.x + a.vx * dt, canvas.width);
  a.y = wrap(a.y + a.vy * dt, canvas.height);
  a.angle += a.rot * dt;
  if (a.flashTimer > 0) a.flashTimer -= dt;
}

function drawAsteroid(a) {
  ctx.save();
  const astC = activeTheme.id === 'psychedelic'
    ? hslRotate(activeTheme.asteroidColor, psychHue + a.angle * 30)
    : activeTheme.asteroidColor;
  setGlow(activeTheme.asteroidGlow);
  ctx.shadowColor = astC;
  ctx.strokeStyle = astC;
  ctx.lineWidth   = activeTheme.id === 'feudalJapan' ? 2.2 : 1.5;
  ctx.translate(a.x, a.y);
  ctx.rotate(a.angle);
  // Feudal Japan: ink-bleed shadow pass — offset duplicate for woodblock feel
  if (activeTheme.id === 'feudalJapan') {
    ctx.save();
    ctx.strokeStyle = 'rgba(139,115,85,0.22)';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(a.verts[0][0] + 1.5, a.verts[0][1] + 1.5);
    for (let i = 1; i < a.verts.length; i++) {
      ctx.lineTo(a.verts[i][0] + 1.5, a.verts[i][1] + 1.5);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
  ctx.beginPath();
  ctx.moveTo(a.verts[0][0], a.verts[0][1]);
  for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i][0], a.verts[i][1]);
  ctx.closePath();
  ctx.stroke();
  // Oni Rock overlays (drawn while still in translated/rotated context)
  if (a.isOni) {
    ctx.save();
    setGlow(16);
    ctx.shadowColor = '#ff2200';
    ctx.strokeStyle = '#cc2200';
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    ctx.arc(0, 0, a.r * 1.1, 0, TAU);
    ctx.stroke();
    clearGlow();
    // HP pips above rock
    const pipSpacing = 14;
    const totalW = (a.maxHp - 1) * pipSpacing;
    for (let h = 0; h < a.maxHp; h++) {
      const px = -totalW / 2 + h * pipSpacing;
      ctx.beginPath();
      ctx.arc(px, -a.r * 1.3, 4, 0, TAU);
      ctx.fillStyle = h < a.hp ? '#ff2200' : '#333';
      ctx.fill();
    }
    // Flash white on hit
    if (a.flashTimer > 0) {
      ctx.globalAlpha = (a.flashTimer / 0.15) * 0.7;
      ctx.fillStyle   = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, 0, a.r, 0, TAU);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }
  ctx.restore();
}

function splitAsteroid(a) {
  sfx.explode(a.size);
  spawnShards(a.x, a.y, a.size);
  const children = [];
  if (a.size === 'large') {
    children.push(makeAsteroid(a.x, a.y, 'medium'));
    children.push(makeAsteroid(a.x, a.y, 'medium'));
  } else if (a.size === 'medium') {
    children.push(makeAsteroid(a.x, a.y, 'small'));
    children.push(makeAsteroid(a.x, a.y, 'small'));
  }
  return children;
}

// ─── Bullets ──────────────────────────────────────────────────────────────────
function fireBullet(from, angle, isUFO) {
  bullets.push({
    x:     from.x + Math.cos(angle) * SHIP_SIZE * 1.2,
    y:     from.y + Math.sin(angle) * SHIP_SIZE * 1.2,
    vx:    Math.cos(angle) * BULLET_SPEED + (isUFO ? 0 : from.vx),
    vy:    Math.sin(angle) * BULLET_SPEED + (isUFO ? 0 : from.vy),
    life:  isUFO ? UFO_BULLET_LIFE : BULLET_LIFE,
    isUFO,
    hasBounced: false,
  });
}

function updateBullet(b, dt) {
  b.x    = wrap(b.x + b.vx * dt, canvas.width);
  b.y    = wrap(b.y + b.vy * dt, canvas.height);
  b.life -= dt;
  // Shuriken bounce (Feudal Japan): reflect off edges once
  if (activeTheme.modifiers.bulletBounce && !b.isUFO && !b.hasBounced) {
    const margin = 4;
    if (b.x < margin || b.x > canvas.width - margin) {
      b.vx *= -1;
      b.x   = Math.max(margin, Math.min(canvas.width - margin, b.x));
      b.hasBounced = true;
      b.life = Math.min(b.life, BULLET_LIFE * 0.55);
    }
    if (b.y < margin || b.y > canvas.height - margin) {
      b.vy *= -1;
      b.y   = Math.max(margin, Math.min(canvas.height - margin, b.y));
      b.hasBounced = true;
      b.life = Math.min(b.life, BULLET_LIFE * 0.55);
    }
  }
}

function drawBullet(b) {
  // Draw as a streak line along the direction of travel
  const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
  if (spd === 0) return;
  const nx = b.vx / spd;
  const ny = b.vy / spd;

  ctx.save();
  setGlow(activeTheme.bulletGlow);
  const bulC = activeTheme.id === 'psychedelic'
    ? hslRotate(activeTheme.bulletColor, psychHue * 2)
    : activeTheme.bulletColor;
  ctx.fillStyle = b.isUFO
    ? (activeTheme.id === 'neonOcean' ? '#ff4466' : '#f55')
    : (b.isSplit ? hslRotate('#ffcc00', psychHue * 1.5) : bulC);
  ctx.beginPath();
  ctx.arc(b.x, b.y, 2.2, 0, TAU);
  ctx.fill();
  ctx.restore();
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a   = rand(0, TAU);
    const spd = rand(30, 160);
    const life = rand(0.4, 1.1);
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life, maxLife: life, color });
  }
}

function updateParticle(p, dt) {
  p.x  += p.vx * dt;
  p.y  += p.vy * dt;
  p.vx *= 0.98;
  p.vy *= 0.98;
  p.life -= dt;
}

function drawParticle(p) {
  ctx.globalAlpha = p.life / p.maxLife;
  ctx.beginPath();
  ctx.arc(p.x, p.y, 2, 0, TAU);
  ctx.fillStyle = p.color;
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ─── Debris shards ────────────────────────────────────────────────────────────
function spawnShards(x, y, size) {
  if (activeTheme.id === 'neonOcean') {
    const cfg2 = { large: { count: 3, spd: 60 },
                   medium:{ count: 2, spd: 80 },
                   small: { count: 1, spd: 100 } }[size];
    for (let i = 0; i < cfg2.count; i++) {
      const life = rand(0.4, 0.7);
      oceanRings.push({
        x, y,
        radius: ASTEROID_SIZES[size] * 0.5,
        expandSpd: cfg2.spd * rand(0.8, 1.2),
        life, maxLife: life,
        color: i === 0 ? '#00ffcc' : '#0088aa',
        alpha: 1,
      });
    }
  }
  const cfg = {
    large:  { count: 12, len: 6, spd: 100, life: 0.50 },
    medium: { count:  8, len: 4, spd: 120, life: 0.38 },
    small:  { count:  5, len: 3, spd: 150, life: 0.25 },
  }[size] || { count: 6, len: 4, spd: 110, life: 0.35 };
  for (let i = 0; i < cfg.count; i++) {
    const angle = rand(0, TAU);
    const speed = rand(cfg.spd * 0.6, cfg.spd * 1.4);
    const lineAngle = rand(0, TAU);
    const life = rand(cfg.life * 0.7, cfg.life * 1.3);
    shards.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      len: cfg.len * rand(0.6, 1.4),
      lineAngle,
      rotSpeed: rand(-4, 4),
      life,
      maxLife: life,
    });
  }
}

function updateRing(r, dt) {
  r.radius += r.expandSpd * dt;
  r.life   -= dt;
  r.alpha   = Math.max(0, r.life / r.maxLife);
}
function drawRing(r) {
  ctx.save();
  ctx.globalAlpha = r.alpha * 0.6;
  ctx.strokeStyle = r.color;
  ctx.lineWidth   = 1.5;
  ctx.shadowBlur  = 10;
  ctx.shadowColor = r.color;
  ctx.beginPath();
  ctx.arc(r.x, r.y, r.radius, 0, TAU);
  ctx.stroke();
  ctx.restore();
}

function updateShard(s, dt) {
  s.x += s.vx * dt;
  s.y += s.vy * dt;
  s.vx *= 0.96;
  s.vy *= 0.96;
  s.lineAngle += s.rotSpeed * dt;
  s.life -= dt;
}

function drawShard(s) {
  const alpha = Math.pow(s.life / s.maxLife, 0.6);
  const cx = Math.cos(s.lineAngle) * s.len * 0.5;
  const cy = Math.sin(s.lineAngle) * s.len * 0.5;
  ctx.save();
  ctx.globalAlpha = alpha;
  const shdC = activeTheme.id === 'psychedelic'
    ? hslRotate(activeTheme.shardColor, psychHue + s.lineAngle * 60)
    : activeTheme.id === 'feudalJapan'
      ? (s.lineAngle % (Math.PI * 2) < Math.PI ? '#e8c87a' : '#d4806a')
      : activeTheme.shardColor;
  setGlow(activeTheme.shardGlow);
  ctx.strokeStyle = shdC;
  ctx.lineWidth   = activeTheme.id === 'neonOcean' ? 2.0
    : activeTheme.id === 'feudalJapan' ? 2.4
    : 1.5;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(s.x - cx, s.y - cy);
  ctx.lineTo(s.x + cx, s.y + cy);
  ctx.stroke();
  ctx.restore();
}

// ─── UFO ──────────────────────────────────────────────────────────────────────
function makeUFO() {
  const side = Math.random() < 0.5 ? 0 : canvas.width;
  const cfg  = getLevelCfg();

  // Wave-gated type probability: 1-4 always big, 5-9 70/30, 10+ 50/50
  const smallChance = wave <= 4 ? 0 : wave <= 9 ? 0.3 : 0.5;
  const type  = Math.random() < smallChance ? 'small' : 'big';
  const isBig = type === 'big';

  const speed = isBig ? 80 : 110;
  return {
    x:    side,
    y:    rand(canvas.height * 0.1, canvas.height * 0.9),
    vx:   (side === 0 ? 1 : -1) * speed,
    vy:   rand(-speed * 0.4, speed * 0.4),
    fireTimer:    cfg.ufoInt * rand(0.5, 1),
    fireInterval: cfg.ufoInt,
    // Big UFO is the dumb one — cap its accuracy at 0.15 regardless of level
    accuracy: isBig ? Math.min(cfg.ufoAcc, 0.15) : cfg.ufoAcc,
    size:  isBig ? 28 : 16,
    score: isBig ? 200 : 1000,
    type,
    dead: false,
  };
}

function updateUFO(u, dt) {
  u.x += u.vx * dt;
  u.y += u.vy * dt;
  if (u.y < 20 || u.y > canvas.height - 20) u.vy *= -1;
  if (u.x < -60 || u.x > canvas.width + 60) u.dead = true;

  u.fireTimer -= dt;
  if (u.fireTimer <= 0 && ship && !ship.dead) {
    u.fireTimer = u.fireInterval * rand(0.8, 1.2);
    // Spread shrinks as accuracy rises: accuracy 0 → ±0.6 rad spread, 1 → perfect
    const spread = (1 - u.accuracy) * 0.6;
    const angle  = Math.atan2(ship.y - u.y, ship.x - u.x) + rand(-spread, spread);
    fireBullet(u, angle, true);
  }
}

const UFO_SHAPE = [[-22,0],[-12,-10],[12,-10],[22,0],[12,10],[-12,10]];
const UFO_TOP   = [[-10,-10],[-6,-20],[6,-20],[10,-10]];

function drawUFO(u) {
  const sc    = u.type === 'big' ? 1.25 : 0.7;  // big=1.25×, small=0.7×
  ctx.save();
  setGlow(activeTheme.ufoGlow);
  ctx.translate(u.x, u.y);
  ctx.scale(sc, sc);
  ctx.strokeStyle = activeTheme.ufoColor;
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(UFO_SHAPE[0][0], UFO_SHAPE[0][1]);
  for (let i = 1; i < UFO_SHAPE.length; i++) ctx.lineTo(UFO_SHAPE[i][0], UFO_SHAPE[i][1]);
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(UFO_TOP[0][0], UFO_TOP[0][1]);
  for (let i = 1; i < UFO_TOP.length; i++) ctx.lineTo(UFO_TOP[i][0], UFO_TOP[i][1]);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

// ─── Collision ────────────────────────────────────────────────────────────────
function circlesOverlap(ax, ay, ar, bx, by, br) {
  return dist(ax, ay, bx, by) < ar + br;
}

function checkCollisions() {
  const newAsteroids = [];
  const keptBullets  = [];

  for (const b of bullets) {
    let hit = false;

    // Bullet vs asteroid
    for (let i = 0; i < asteroids.length; i++) {
      const a = asteroids[i];
      if (circlesOverlap(b.x, b.y, 3, a.x, a.y, a.r)) {
        hit = true;
        if (!b.isUFO) {
          const prevScore = score;
          score += ASTEROID_SCORES[a.size];
          if (score >= nextExtraLife) { lives = Math.min(lives + 1, 6); nextExtraLife += 10000; extraLifeMsg = 1.5; sfx.extraLife(); }
          if (prevScore < 10000 && score >= 10000 && activeTheme.id !== 'base') {
            Steam.unlockAchievement('THEME_SCORE_10K_' + activeTheme.id.toUpperCase());
          }
        }
        // Oni Rock damage handling
        if (a.isOni) {
          a.hp--;
          a.flashTimer = 0.15;
          score += 300;
          if (a.hp > 0) {
            newAsteroids.push(a);
            asteroids.splice(i, 1);
            hit = true;
            break;
          } else {
            score += 500;
          }
        }
        newAsteroids.push(...splitAsteroid(a));
        // Psychedelic fractal split: child bullets on hit
        if (!b.isUFO && activeTheme.modifiers.bulletSplitChance > 0
            && Math.random() < activeTheme.modifiers.bulletSplitChance) {
          const baseAngle = Math.atan2(b.vy, b.vx);
          for (const sa of [baseAngle - 0.28, baseAngle + 0.28]) {
            bullets.push({
              x: a.x, y: a.y,
              vx: Math.cos(sa) * BULLET_SPEED * 0.7,
              vy: Math.sin(sa) * BULLET_SPEED * 0.7,
              life: BULLET_LIFE * 0.5,
              isUFO: false, isSplit: true,
            });
          }
        }
        // Combo system
        if (activeTheme.modifiers.comboWindow > 0) {
          comboCount++;
          comboTimer = activeTheme.modifiers.comboWindow;
          comboMult  = Math.min(4, 1 + Math.floor(comboCount / 3));
          score += ASTEROID_SCORES[a.size] * (comboMult - 1);
        }
        asteroids.splice(i, 1);
        break;
      }
    }

    // UFO bullet vs ship
    if (!hit && b.isUFO && ship && !ship.dead && ship.invincible <= 0) {
      if (circlesOverlap(b.x, b.y, 3, ship.x, ship.y, SHIP_SIZE * 0.9)) {
        hit = true;
        killShip();
      }
    }

    // Player bullet vs UFO
    if (!hit && !b.isUFO && ufo && !ufo.dead) {
      if (circlesOverlap(b.x, b.y, 3, ufo.x, ufo.y, ufo.size)) {
        hit = true;
        const prevScore2 = score;
        score += ufo.score;
        if (score >= nextExtraLife) { lives = Math.min(lives + 1, 6); nextExtraLife += 10000; extraLifeMsg = 1.5; sfx.extraLife(); }
        if (prevScore2 < 10000 && score >= 10000 && activeTheme.id !== 'base') {
          Steam.unlockAchievement('THEME_SCORE_10K_' + activeTheme.id.toUpperCase());
        }
        sfx.explode('large');
        spawnParticles(ufo.x, ufo.y, '#fff', 14);
        sfx.ufoStop();
        ufo = null;
        ufoTimer = 0;
      }
    }

    if (!hit) keptBullets.push(b);
  }
  bullets = keptBullets;
  asteroids.push(...newAsteroids);

  // Ship vs asteroids
  if (ship && !ship.dead && ship.invincible <= 0) {
    for (const a of asteroids) {
      // Ship wings/nose reach ~17-18px from center; 0.9× ≈ 16px gives a sliver of
      // visual forgiveness without creating the old ~5px "ghost hit" dead zone.
      // Asteroid uses 0.9× its nominal radius — vertices vary 0.75–1.25×, so this
      // fires before the spiky tips but well inside the average visual edge.
      if (circlesOverlap(ship.x, ship.y, SHIP_SIZE * 0.9, a.x, a.y, a.r * 0.9)) {
        killShip();
        break;
      }
    }
  }

  // Ship vs UFO body
  if (ship && !ship.dead && ship.invincible <= 0 && ufo && !ufo.dead) {
    if (circlesOverlap(ship.x, ship.y, SHIP_SIZE * 0.9, ufo.x, ufo.y, ufo.size)) {
      killShip();
    }
  }
}

function killShip() {
  sfx.thrustOff();
  sfx.explode('large');
  // Ship explosion: extra mid-crack layer to distinguish "you died" from "rock broke"
  if (audioCtx) {
    const t = audioCtx.currentTime;
    const src = audioCtx.createBufferSource();
    src.buffer = makeNoiseBuf(0.25);
    const bp = audioCtx.createBiquadFilter();
    bp.type           = 'bandpass';
    bp.frequency.value = 800;
    bp.Q.value         = 0.8;
    const gs = audioCtx.createGain();
    gs.gain.setValueAtTime(0.65, t);
    gs.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    src.connect(bp); bp.connect(gs); gs.connect(audioCtx.destination);
    src.start(t); src.stop(t + 0.27);
  }
  // Spawn shards along the ship's 4 edges flying outward
  for (let i = 0; i < 4; i++) {
    const angle = ship.angle + (i / 4) * TAU;
    const speed = rand(60, 160);
    const life  = rand(0.5, 1.2);
    shards.push({
      x: ship.x + Math.cos(angle) * SHIP_SIZE * 0.5,
      y: ship.y + Math.sin(angle) * SHIP_SIZE * 0.5,
      vx: Math.cos(angle - Math.PI / 2) * speed + rand(-40, 40),
      vy: Math.sin(angle - Math.PI / 2) * speed + rand(-40, 40),
      len: rand(10, 22),
      lineAngle: angle + Math.PI / 2,
      rotSpeed: rand(-5, 5),
      life,
      maxLife: life,
    });
  }
  // Extra center burst shards
  for (let i = 0; i < 5; i++) {
    const a    = rand(0, TAU);
    const spd  = rand(40, 120);
    const life = rand(0.4, 0.9);
    shards.push({
      x: ship.x, y: ship.y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      len: rand(8, 16), lineAngle: rand(0, TAU),
      rotSpeed: rand(-6, 6), life, maxLife: life,
    });
  }
  comboCount = 0; comboMult = 1; comboTimer = 0;
  lives--;
  ship.dead = true;

  if (lives <= 0) {
    sfx.ufoStop();
    music.stop();
    state = 'gameover';
    gameOverDelay = 1.5;
    if (score > hiScore) hiScore = score;
  } else {
    state     = 'dead';
    waveDelay = 2.5;
  }
}

// ─── State transitions ────────────────────────────────────────────────────────
function handleGameOverContinue() {
  if (lbQualifies(score)) {
    state       = 'enterName';
    pendingName = '';
    nameInput.value = '';
    // Focus the hidden input to pull up mobile keyboard
    setTimeout(() => nameInput.focus(), 50);
  } else {
    lastSavedRank = -1;
    state = 'leaderboard';
  }
}

function submitName() {
  const name = (pendingName.trim() || 'AAA').slice(0, 12);
  const lb   = lbAdd(name, score, wave);
  lastSavedRank = lb.findIndex(e => e.score === score && e.name === name.toUpperCase());
  nameInput.blur();
  state = 'leaderboard';
}

function goToTitle() {
  initTitle();
  state = 'title';
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  W = canvas.width; H = canvas.height;

  // Responsive font sizes
  const scoreSize   = Math.max(28, Math.round(W * 0.038));
  const labelSize   = Math.max(11, Math.round(W * 0.016));
  const iconScale   = scoreSize / 22;
  const iconSpacing = Math.round(28 * iconScale);
  const topY        = scoreSize + 8;  // baseline for score numbers

  // ── Top-left: score (no label) ───────────────────────────────────────────
  ctx.textAlign = 'left';
  ctx.fillStyle = activeTheme.id === 'psychedelic'
    ? hslRotate(activeTheme.hudScoreColor, psychHue)
    : activeTheme.hudScoreColor;
  ctx.font      = `bold ${scoreSize}px monospace`;
  setGlow(4);
  if (activeTheme.id === 'feudalJapan') ctx.shadowColor = '#cc7700';
  ctx.fillText(String(score).padStart(6, '0'), 20, topY);
  clearGlow();

  // ── Top-center: hi-score number only (small, muted) ──────────────────────
  ctx.textAlign = 'center';
  ctx.fillStyle = activeTheme.hudHiColor;
  ctx.font      = `${labelSize}px monospace`;
  ctx.fillText(String(hiScore).padStart(6, '0'), W / 2, labelSize + 4);

  // ── Top-right: WAVE number ────────────────────────────────────────────────
  ctx.textAlign = 'right';
  ctx.fillStyle = activeTheme.hudWaveColor;
  ctx.font      = `${labelSize}px monospace`;
  ctx.fillText('WAVE ' + wave, W - 20, labelSize + 4);

  // ── Combo multiplier display ─────────────────────────────────────────────
  if (comboMult > 1) {
    ctx.font = `bold ${Math.min(18, W * 0.028)}px monospace`;
    ctx.textAlign = 'right';
    if (activeTheme.id === 'feudalJapan') {
      ctx.fillStyle = '#cc4400';
      ctx.fillText('HONOR ' + '|'.repeat(comboMult - 1), W - 20, H - 14);
    } else {
      const comboColor = activeTheme.id === 'psychedelic'
        ? hslRotate('#ffcc00', psychHue) : '#cc4400';
      ctx.fillStyle = comboColor;
      ctx.fillText(comboMult + 'x COMBO', W - 20, H - 14);
    }
  }

  // ── Ocean current direction indicator (Neon Ocean only) ─────────────────
  if (activeTheme.modifiers.oceanCurrent && currentSpeed > 5) {
    const arrowX   = W / 2;
    const arrowY   = H - 28;
    const arrowLen = 14;
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#00ddff';
    ctx.lineWidth   = 1.5;
    ctx.translate(arrowX, arrowY);
    ctx.rotate(currentAngle);
    ctx.beginPath();
    ctx.moveTo(-arrowLen, 0);
    ctx.lineTo(arrowLen, 0);
    ctx.moveTo(arrowLen - 5, -5);
    ctx.lineTo(arrowLen, 0);
    ctx.lineTo(arrowLen - 5, 5);
    ctx.stroke();
    ctx.restore();
  }

  // ── Below score: life ship icons (slightly smaller) ──────────────────────
  const lifeScale   = iconScale * 0.72;
  const lifeSpacing = Math.round(24 * lifeScale);
  const lifeIconY   = topY + lifeSpacing + 6;
  for (let i = 0; i < lives; i++) {
    ctx.save();
    ctx.translate(20 + lifeSpacing * 0.5 + i * lifeSpacing, lifeIconY);
    ctx.rotate(-Math.PI / 2);
    ctx.strokeStyle = activeTheme.hudLifeColor;
    ctx.lineWidth   = 1.2;
    const s = SHIP_SIZE * lifeScale;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.7);
    ctx.lineTo(-s * 0.42,  s * 0.52);
    ctx.lineTo(0,  s * 0.24);
    ctx.lineTo( s * 0.42,  s * 0.52);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // ── Extra life notification banner ───────────────────────────────────────
  if (extraLifeMsg > 0) {
    ctx.globalAlpha = Math.min(1, extraLifeMsg / 0.4);
    ctx.fillStyle   = activeTheme.extraLifeColor;
    ctx.font        = `bold ${Math.max(22, Math.round(W * 0.035))}px monospace`;
    ctx.textAlign   = 'center';
    ctx.fillText('EXTRA LIFE!', W / 2, H * 0.20);
    ctx.globalAlpha = 1;
  }

  if (isMobile) drawMobileHUD();
}

function drawMobileHUD() {
  W = canvas.width; H = canvas.height;
  const scale = Math.min(W, H) / 600;
  const joyR  = Math.max(55, Math.min(80, 60 * scale));
  const fireR = Math.max(45, Math.min(70, 55 * scale));
  const hyR   = Math.max(28, Math.min(45, 35 * scale));
  const pad   = 24;

  joyRegion.x = pad + joyR;
  joyRegion.y = H - pad - joyR;
  joyRegion.r = joyR;

  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.arc(joyRegion.x, joyRegion.y, joyR, 0, TAU);
  ctx.stroke();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#0ff';
  ctx.fill();

  let nubX = joyRegion.x, nubY = joyRegion.y;
  if (joyTouch) {
    const dx = joyTouch.curX - joyTouch.startX;
    const dy = joyTouch.curY - joyTouch.startY;
    const mag = Math.sqrt(dx*dx + dy*dy);
    const clamp = Math.min(mag, joyR * 0.6);
    nubX = joyRegion.x + (mag > 0 ? dx / mag : 0) * clamp;
    nubY = joyRegion.y + (mag > 0 ? dy / mag : 0) * clamp;
  }
  ctx.globalAlpha = joyTouch ? 0.8 : 0.45;
  ctx.beginPath();
  ctx.arc(nubX, nubY, joyR * 0.32, 0, TAU);
  ctx.fillStyle = '#0ff';
  ctx.fill();
  ctx.restore();

  fireRegion.x = W - pad - fireR;
  fireRegion.y = H - pad - fireR;
  fireRegion.r = fireR;

  ctx.save();
  ctx.globalAlpha = fireTouch ? 0.6 : 0.22;
  ctx.beginPath();
  ctx.arc(fireRegion.x, fireRegion.y, fireR, 0, TAU);
  ctx.fillStyle = '#f55'; ctx.fill();
  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = '#f55'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(fireR * 0.42)}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('FIRE', fireRegion.x, fireRegion.y);
  ctx.restore();

  hyperRegion.x = W - pad - hyR;
  hyperRegion.y = pad + hyR;
  hyperRegion.r = hyR;

  ctx.save();
  ctx.globalAlpha = hyperTouch ? 0.55 : 0.18;
  ctx.beginPath();
  ctx.arc(hyperRegion.x, hyperRegion.y, hyR, 0, TAU);
  ctx.fillStyle = '#ff0'; ctx.fill();
  ctx.globalAlpha = 0.55;
  ctx.strokeStyle = '#ff0'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(hyR * 0.38)}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('HYPER', hyperRegion.x, hyperRegion.y);
  ctx.restore();

  ctx.textBaseline = 'alphabetic';
}

// ─── Screens ──────────────────────────────────────────────────────────────────
function drawTitle() {
  W = canvas.width; H = canvas.height;
  ctx.fillStyle = activeTheme.bgColor;
  ctx.fillRect(0, 0, W, H);
  // Neon Ocean: deep-sea vignette on title screen
  if (activeTheme.id === 'neonOcean') {
    const vg = ctx.createRadialGradient(
      W/2, H/2, Math.min(W,H) * 0.3,
      W/2, H/2, Math.min(W,H) * 0.85
    );
    vg.addColorStop(0, 'rgba(0,8,16,0)');
    vg.addColorStop(1, 'rgba(0,2,12,0.7)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }
  // Feudal Japan: warm amber vignette on title screen
  if (activeTheme.id === 'feudalJapan') {
    const vg = ctx.createRadialGradient(
      W/2, H/2, Math.min(W,H) * 0.25,
      W/2, H/2, Math.min(W,H) * 0.9
    );
    vg.addColorStop(0, 'rgba(10,7,5,0)');
    vg.addColorStop(1, 'rgba(20,8,0,0.75)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }
  drawStars();

  // Background drifting asteroids
  for (const a of asteroids) drawAsteroid(a);
  for (const p of particles) drawParticle(p);

  // Title: "I ❤️ 1979" — a love letter to the original
  const titleSize = Math.min(62, W * 0.09);
  const heartSize = Math.min(52, W * 0.075);
  const titleY    = H * 0.26;

  // Pulsing heart — gentle scale oscillation
  const heartPulse = 1 + Math.sin(titleHeartPhase) * 0.08;

  ctx.textAlign = 'center';
  setGlow(8);

  // "I" in white
  ctx.font      = `bold ${titleSize}px monospace`;
  ctx.fillStyle = '#fff';
  const iW     = ctx.measureText('I').width;
  const heartW = heartSize * 1.1;
  const yearW  = ctx.measureText('1979').width;
  const gap    = titleSize * 0.35;
  const totalW = iW + gap + heartW + gap + yearW;
  const startX = W / 2 - totalW / 2;

  ctx.fillText('I', startX + iW / 2, titleY);

  // ❤️ heart — red, pulsing
  ctx.save();
  const heartX = startX + iW + gap + heartW / 2;
  ctx.translate(heartX, titleY - heartSize * 0.32);
  ctx.scale(heartPulse, heartPulse);
  ctx.font = `${heartSize}px serif`;
  ctx.fillStyle = '#ff2244';
  ctx.shadowColor = '#ff2244';
  ctx.shadowBlur  = 14;
  ctx.fillText('❤', 0, 0);
  ctx.restore();

  // "1979" in arcade yellow (or themed)
  setGlow(6);
  ctx.font = `bold ${titleSize}px monospace`;
  const yearColor = activeTheme.id === 'base'       ? '#FFD700'
    : activeTheme.id === 'neonOcean'                 ? '#00ffcc'
    : activeTheme.id === 'feudalJapan'               ? '#cc4400'
    : hslRotate('#FFD700', psychHue);
  ctx.fillStyle = yearColor;
  ctx.fillText('1979', startX + iW + gap + heartW + gap + yearW / 2, titleY);

  // Theme name badge below the title
  if (activeTheme.id !== 'base') {
    const badgeY = titleY + titleSize * 0.5;
    ctx.font = `${Math.min(26, W * 0.040)}px monospace`;
    ctx.fillStyle = activeTheme.id === 'neonOcean'   ? activeTheme.hudHiColor
      : activeTheme.id === 'feudalJapan'             ? '#cc4400'
      : hslRotate('#FFD700', psychHue);
    ctx.textAlign = 'center';
    ctx.fillText('[ ' + activeTheme.name + ' VIBE ]', W / 2, badgeY);
  }

  clearGlow();
  ctx.textAlign = 'center';

  // ── Menu items — label left-center, key hint to the right ────────────────
  const menuSize = Math.min(18, W * 0.030);
  const hintSize = Math.min(13, W * 0.020);
  const menuY0   = H * 0.40;
  const menuGap  = menuSize * 1.8;

  function menuRow(label, hint, y, labelColor) {
    ctx.font      = `bold ${menuSize}px monospace`;
    ctx.fillStyle = labelColor;
    const labelW  = ctx.measureText(label).width;
    ctx.font      = `${hintSize}px monospace`;
    const hintW   = isMobile ? 0 : ctx.measureText(hint).width;
    const pad     = isMobile ? 0 : menuSize * 0.8;
    const totalW  = labelW + pad + hintW;
    const lx      = W / 2 - totalW / 2;

    ctx.font      = `bold ${menuSize}px monospace`;
    ctx.fillStyle = labelColor;
    ctx.textAlign = 'left';
    ctx.fillText(label, lx, y);

    if (!isMobile) {
      ctx.font      = `${hintSize}px monospace`;
      ctx.fillStyle = 'rgba(255,255,255,0.30)';
      ctx.textAlign = 'left';
      ctx.fillText(hint, lx + labelW + pad, y);
    }
  }

  menuRow('PLAY',            '[SPACE / ENTER]', menuY0,              '#fff');
  menuRow('CHANGE THE VIBE', '[T]',             menuY0 + menuGap,     '#FFD700');
  menuRow('THE STORY',       '[S]',             menuY0 + menuGap * 2, 'rgba(255,255,255,0.65)');

  ctx.textAlign = 'center';

  // Controls
  if (!isMobile) {
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = `${Math.min(12, W * 0.018)}px monospace`;
    ctx.fillText('WASD / ARROWS: MOVE    SPACE: FIRE    H: HYPERSPACE', W / 2, menuY0 + menuGap * 3);
  }

  // Mini leaderboard peek — top 3 scores
  const lb = lbLoad();
  if (lb.length > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('— HALL OF FAME —', W / 2, H * 0.68);
    ctx.font = '15px monospace';
    const show = lb.slice(0, 3);
    show.forEach((e, i) => {
      ctx.fillStyle = i === 0 ? '#fff' : '#aaa';
      ctx.fillText(
        `${i + 1}.  ${e.name.padEnd(12)}  ${String(e.score).padStart(6)}`,
        W / 2, H * 0.73 + i * 20
      );
    });
  }

  if (hiScore > 0 && lb.length === 0) {
    ctx.fillStyle = '#fff';
    ctx.font = '18px monospace';
    ctx.fillText('HI SCORE: ' + hiScore, W / 2, H * 0.73);
  }
}

function drawThemeSelect() {
  W = canvas.width; H = canvas.height;
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.min(41, W * 0.067)}px monospace`;
  setGlow(6);
  ctx.fillText('CHANGE THE VIBE', W / 2, H * 0.14);
  clearGlow();

  const rowH   = Math.min(H * 0.19, 108);
  const startY = H * 0.22;
  const padX   = Math.max(30, W * 0.08);

  THEME_LIST.forEach((pack, i) => {
    const y       = startY + i * rowH;
    const owned   = DLC.isUnlocked(pack.id);
    const active  = activeTheme.id === pack.id;
    const hl      = i === themeSelectIndex;

    // Row background highlight
    if (hl) {
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = '#fff';
      ctx.fillRect(padX, y, W - padX * 2, rowH - 8);
      ctx.globalAlpha = 1;
    }

    // Left: theme name + description
    ctx.textAlign = 'left';
    ctx.fillStyle = active ? '#FFD700' : '#fff';
    ctx.font = `bold ${Math.min(28, W * 0.042)}px monospace`;
    ctx.fillText(pack.name, padX + 16, y + rowH * 0.40);

    ctx.fillStyle = active ? '#ccaa00' : '#aaa';
    ctx.font = `${Math.min(16, W * 0.024)}px monospace`;
    ctx.fillText(pack.desc, padX + 16, y + rowH * 0.70);

    // Right: status badge
    ctx.textAlign = 'right';
    const badgeX = W - padX - 16;
    if (active) {
      ctx.fillStyle = '#FFD700';
      ctx.font = `bold ${Math.min(14, W * 0.022)}px monospace`;
      ctx.fillText('ACTIVE', badgeX, y + rowH * 0.52);
    } else {
      ctx.fillStyle = '#aaa';
      ctx.font = `${Math.min(14, W * 0.022)}px monospace`;
      ctx.fillText('SELECT', badgeX, y + rowH * 0.52);
    }

    // Divider
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padX, y + rowH - 4);
    ctx.lineTo(W - padX, y + rowH - 4);
    ctx.stroke();
  });

  // Footer
  ctx.textAlign = 'center';
  ctx.fillStyle = '#333';
  ctx.font = '13px monospace';
  const footer = isMobile
    ? 'TAP ROW TO SELECT'
    : 'ARROW KEYS TO NAVIGATE   ENTER TO SELECT   ESC TO BACK';
  ctx.fillText(footer, W / 2, H * 0.88);
}

function handleThemesTouch(e) {
  const W = canvas.width, H = canvas.height;
  const rowH   = Math.min(H * 0.19, 108);
  const startY = H * 0.22;

  for (const t of e.changedTouches) {
    const ty = t.clientY;

    const i = Math.floor((ty - startY) / rowH);
    if (i >= 0 && i < THEME_LIST.length) {
      activateOrPurchasePack(i);
      return;
    }
  }
}

function activateOrPurchasePack(index) {
  const pack = THEME_LIST[index];
  if (!pack) return;

  setTheme(pack.id);
  // If a theme changes audio context settings, restart UFO sound
  if (ufo) { sfx.ufoStop(); sfx.ufoStart(ufo.type); }
  // Return to title screen so the player can see the theme applied
  goToTitle();
}

function drawLeaderboard() {
  W = canvas.width; H = canvas.height;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.min(36, W * 0.06)}px monospace`;
  ctx.fillText('HALL OF FAME', W / 2, H * 0.10);

  const lb     = lbLoad();
  const rowH   = Math.min(H * 0.072, 42);
  const startY = H * 0.18;
  const rowFont = Math.max(14, Math.min(17, W * 0.026));

  // Fixed column x positions — drawn left-aligned (rank, name) or right-aligned (score, lvl)
  const cRank  = W * 0.10;   // "#" left edge
  const cName  = W * 0.20;   // name left edge
  const cScore = W * 0.74;   // score right edge
  const cLvl   = W * 0.88;   // level right edge

  // Header
  ctx.font      = `${Math.max(12, rowFont - 2)}px monospace`;
  ctx.fillStyle = '#444';
  ctx.textAlign = 'left';
  ctx.fillText('#',     cRank,  startY - 6);
  ctx.fillText('NAME',  cName,  startY - 6);
  ctx.textAlign = 'right';
  ctx.fillText('SCORE', cScore, startY - 6);
  ctx.fillText('WAVE',  cLvl,   startY - 6);

  // Separator line
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W * 0.08, startY + 2);
  ctx.lineTo(W * 0.92, startY + 2);
  ctx.stroke();

  if (lb.length === 0) {
    ctx.fillStyle = '#444';
    ctx.font = '18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('NO SCORES YET — BE THE FIRST!', W / 2, H * 0.5);
  }

  lb.forEach((entry, i) => {
    const y       = startY + rowH * (i + 1);
    const isNew   = i === lastSavedRank;
    const isFirst = i === 0;

    // Highlight glow for new entry
    if (isNew) {
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#fff';
      ctx.fillRect(W * 0.08, y - rowH * 0.75, W * 0.84, rowH * 0.88);
      ctx.restore();
    }

    ctx.fillStyle = isNew ? '#fff' : isFirst ? '#fff' : '#ccc';
    ctx.font      = isNew
      ? `bold ${rowFont}px monospace`
      : `${rowFont}px monospace`;

    // Draw each column at its fixed x — proper visual alignment
    ctx.textAlign = 'left';
    ctx.fillText(String(i + 1),  cRank,  y);
    ctx.fillText(entry.name,     cName,  y);
    ctx.textAlign = 'right';
    ctx.fillText(String(entry.score), cScore, y);
    ctx.fillText(entry.wave,   cLvl,   y);
  });

  ctx.fillStyle = '#444';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(isMobile ? 'TAP TO CONTINUE' : 'SPACE / ENTER TO CONTINUE', W / 2, H * 0.95);
}
